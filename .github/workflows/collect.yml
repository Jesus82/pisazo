name: Daily Data Collection

on:
  schedule:
    # Run daily at 8:00 AM UTC (10:00 AM CEST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data collection
        env:
          NUXT_TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          NUXT_TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NUXT_IDEALISTA_API_KEY: ${{ secrets.IDEALISTA_API_KEY }}
          NUXT_IDEALISTA_API_SECRET: ${{ secrets.IDEALISTA_API_SECRET }}
        run: npm run collect
